  zone_6_sprinkler_profile: !input zone_6_sprinkler_profile
  zone_6_custom_rate_mm_h: !input zone_6_custom_rate_mm_h
  zone_6_runtime_adjustment_percent: !input zone_6_runtime_adjustment_percent
  zone_6_online_sensor: !input zone_6_online_sensor
  zone_6_battery_sensor: !input zone_6_battery_sensor

  zone_7_valve: !input zone_7_valve
  zone_7_name: !input zone_7_name
  zone_7_soil_type: !input zone_7_soil_type
  zone_7_plant_type: !input zone_7_plant_type
  zone_7_sprinkler_profile: !input zone_7_sprinkler_profile
  zone_7_custom_rate_mm_h: !input zone_7_custom_rate_mm_h
  zone_7_runtime_adjustment_percent: !input zone_7_runtime_adjustment_percent
  zone_7_online_sensor: !input zone_7_online_sensor
  zone_7_battery_sensor: !input zone_7_battery_sensor

  zone_8_valve: !input zone_8_valve
  zone_8_name: !input zone_8_name
  zone_8_soil_type: !input zone_8_soil_type
  zone_8_plant_type: !input zone_8_plant_type
  zone_8_sprinkler_profile: !input zone_8_sprinkler_profile
  zone_8_custom_rate_mm_h: !input zone_8_custom_rate_mm_h
  zone_8_runtime_adjustment_percent: !input zone_8_runtime_adjustment_percent
  zone_8_online_sensor: !input zone_8_online_sensor
  zone_8_battery_sensor: !input zone_8_battery_sensor

  schedule_mode: !input schedule_mode
  sun_event_offset_minutes: !input sun_event_offset_minutes
  enable_backup_time: !input enable_backup_time
  season_start_month: !input season_start_month
  season_end_month: !input season_end_month
  waterings_per_week: !input waterings_per_week
  min_dose_mm: !input min_dose_mm
  max_dose_mm: !input max_dose_mm
  min_runtime_minutes: !input min_runtime_minutes
  max_runtime_minutes: !input max_runtime_minutes
  zone_pause_seconds: !input zone_pause_seconds
  max_forecast_rain_mm: !input max_forecast_rain_mm
  max_rain_probability_percent: !input max_rain_probability_percent
  rain_credit_percent: !input rain_credit_percent
  min_temperature_c: !input min_temperature_c
  hot_temperature_c: !input hot_temperature_c
  max_wind: !input max_wind
  min_battery_percent: !input min_battery_percent
  irrigation_efficiency_percent: !input irrigation_efficiency_percent
  enable_irrigation_logs: !input enable_irrigation_logs
  create_persistent_notification: !input create_persistent_notification
  bad_weather_states:
    - rainy
    - pouring
    - lightning
    - lightning-rainy
    - hail
    - snowy
    - snowy-rainy
  current_weather_entity: >-
    {% set e = current_weather_entity_input | default('', true) %}
    {{ forecast_weather_entity if e | length == 0 else e }}
  schedule_trigger_ok: >-
    {% if schedule_mode == 'fixed_time' %}
      {{ trigger.id == 'primary' or (trigger.id == 'backup' and (enable_backup_time | bool)) }}
    {% elif trigger.id == 'sun_check' and schedule_mode in ['sunrise', 'sunset'] %}
      {% set attr = 'next_rising' if schedule_mode == 'sunrise' else 'next_setting' %}
      {% set next_event = state_attr('sun.sun', attr) %}
      {% set next_ts = as_timestamp(next_event) if next_event is not none else 0 %}
      {% set now_ts = as_timestamp(now()) %}
      {% set offset = (sun_event_offset_minutes | int(0)) * 60 %}
      {% set window = 90 %}
      {% set target_next = next_ts + offset %}
      {% set target_previous = next_ts - 86400 + offset %}
      {{ next_ts > 0
         and ((now_ts >= target_next and now_ts < target_next + window)
              or (now_ts >= target_previous and now_ts < target_previous + window)) }}
    {% else %}
      false
    {% endif %}

actions:
  - alias: Harmonogram startu pasuje
    condition: template
    value_template: "{{ schedule_trigger_ok | bool }}"

  - alias: Pobierz prognoze dzienna
    action: weather.get_forecasts
    target:
      entity_id: !input forecast_weather_entity
    data:
      type: daily
    response_variable: daily_forecast

  - alias: Wylicz pogode i wspolne warunki
    variables:
      forecast_condition: >-
        {% set fc = daily_forecast.get(forecast_weather_entity, {}).get('forecast', []) %}
        {{ fc[0].condition | default(states(forecast_weather_entity), true) if fc | count > 0 else states(forecast_weather_entity) }}
      current_weather_condition_pl: >-
        {% set condition = states(current_weather_entity) | trim %}
        {% set names = {
          'clear-night': 'bezchmurna noc',
          'cloudy': 'pochmurno',
          'exceptional': 'warunki wyjatkowe',
          'fog': 'mgla',
          'hail': 'grad',
          'lightning': 'burza',
          'lightning-rainy': 'burza z deszczem',
          'partlycloudy': 'czesciowe zachmurzenie',
          'pouring': 'ulewny deszcz',
          'rainy': 'deszcz',
          'snowy': 'snieg',
          'snowy-rainy': 'snieg z deszczem',
          'sunny': 'slonecznie',
          'windy': 'wietrznie',
          'windy-variant': 'wietrznie z zachmurzeniem',
          'unknown': 'nieznany',
          'unavailable': 'niedostepny'
        } %}
        {{ names.get(condition, condition) }}
      forecast_condition_pl: >-
        {% set condition = forecast_condition | trim %}
        {% set names = {
          'clear-night': 'bezchmurna noc',
          'cloudy': 'pochmurno',
          'exceptional': 'warunki wyjatkowe',
          'fog': 'mgla',
          'hail': 'grad',
          'lightning': 'burza',
          'lightning-rainy': 'burza z deszczem',
          'partlycloudy': 'czesciowe zachmurzenie',
          'pouring': 'ulewny deszcz',
          'rainy': 'deszcz',
          'snowy': 'snieg',
          'snowy-rainy': 'snieg z deszczem',
          'sunny': 'slonecznie',
          'windy': 'wietrznie',
          'windy-variant': 'wietrznie z zachmurzeniem',
          'unknown': 'nieznany',
          'unavailable': 'niedostepny'
        } %}
        {{ names.get(condition, condition) }}
      forecast_temperature: >-
        {% set fc = daily_forecast.get(forecast_weather_entity, {}).get('forecast', []) %}
        {% set fallback = state_attr(forecast_weather_entity, 'temperature') | float(0) %}
        {{ fc[0].temperature | default(fallback, true) | float(fallback) if fc | count > 0 else fallback }}
      forecast_precipitation: >-
        {% set fc = daily_forecast.get(forecast_weather_entity, {}).get('forecast', []) %}
        {% set fallback = state_attr(forecast_weather_entity, 'precipitation') | float(0) %}
        {{ fc[0].precipitation | default(fallback, true) | float(fallback) if fc | count > 0 else fallback }}
      forecast_precipitation_probability: >-
        {% set fc = daily_forecast.get(forecast_weather_entity, {}).get('forecast', []) %}
        {{ fc[0].precipitation_probability | default(0, true) | int(0) if fc | count > 0 else 0 }}
      current_rain_mm: >-
        {% set e = rain_amount_sensor | default('', true) %}
        {% if e | length > 0 and states(e) | is_number %}
          {{ states(e) | float(0) }}
        {% else %}
          {{ state_attr(current_weather_entity, 'precipitation') | float(0) }}
        {% endif %}
      temp_c: >-
        {% set e = temperature_source_entity | default('', true) %}
        {% if e | length == 0 %}
          {{ forecast_temperature | float(0) }}
        {% elif e.split('.')[0] == 'weather' %}
          {{ state_attr(e, 'temperature') | float(forecast_temperature | float(0)) }}
        {% else %}
          {{ states(e) | float(forecast_temperature | float(0)) }}
        {% endif %}
      wind_value: >-
        {% set e = wind_source_entity | default('', true) %}
        {% if e | length == 0 %}
          {{ state_attr(current_weather_entity, 'wind_speed') | float(0) }}
        {% elif e.split('.')[0] == 'weather' %}
          {{ state_attr(e, 'wind_speed') | float(0) }}
        {% else %}
          {{ states(e) | float(0) }}
        {% endif %}
      sunlight_index: >-
        {% set e = sunlight_source_entity | default('', true) %}
        {% if e | length == 0 %}
          {{ state_attr(current_weather_entity, 'uv_index') | float(5) }}
        {% elif e.split('.')[0] == 'weather' %}
          {{ state_attr(e, 'uv_index') | float(5) }}
        {% else %}
          {{ states(e) | float(5) }}
        {% endif %}
      soil_moisture_percent: >-
        {% set e = soil_moisture_sensor | default('', true) %}
        {% if e | length > 0 and states(e) | is_number %}
          {{ states(e) | float(0) }}
        {% else %}
          -1
        {% endif %}
      soil_moisture_factor: >-
        {% set m = soil_moisture_percent | float(-1) %}
        {% if m < 0 %}1
        {% elif m >= 70 %}0
        {% elif m >= 60 %}0.55
        {% elif m <= 25 %}1.2
        {% else %}1
        {% endif %}
      season_ok: >-
        {% set start = season_start_month | int(4) %}
        {% set end = season_end_month | int(10) %}
        {% set month = now().month %}
        {% if start <= end %}
          {{ month >= start and month <= end }}
        {% else %}
          {{ month >= start or month <= end }}
        {% endif %}
      weather_ok: >-
        {{ states(current_weather_entity) not in bad_weather_states
           and forecast_condition not in bad_weather_states }}
      rain_sensor_ok: >-
        {{ rain_binary_sensor | default('', true) | length == 0
           or is_state(rain_binary_sensor, 'off') }}
      forecast_rain_ok: >-
        {{ (forecast_precipitation | float(0)) <= (max_forecast_rain_mm | float(4))
           and not ((forecast_precipitation_probability | int(0)) >= (max_rain_probability_percent | int(80))
                    and (forecast_precipitation | float(0)) >= 1) }}
      temp_ok: "{{ (temp_c | float(0)) >= (min_temperature_c | float(8)) }}"
      wind_ok: "{{ (wind_value | float(0)) <= (max_wind | float(35)) }}"
      temp_factor: >-
        {% set t = temp_c | float(0) %}
        {% if t < 12 %}0.6
        {% elif t < 20 %}0.85
        {% elif t < (hot_temperature_c | float(28)) %}1
        {% else %}1.25
        {% endif %}
      sun_factor: >-
        {% set u = sunlight_index | float(5) %}
        {% if u < 2 %}0.9{% elif u <= 7 %}1{% else %}1.1{% endif %}
      rain_credit_mm: >-
        {% set credit = rain_credit_percent | float(80) / 100 %}
        {{ (((forecast_precipitation | float(0)) + (current_rain_mm | float(0))) * credit) | round(1) }}

  - alias: Wylicz powod pominiecia podlewania
    variables:
      irrigation_skip_reason: >-
        {% if not (season_ok | bool) %}
          Poza sezonem podlewania. Aktywny sezon to miesiace {{ season_start_month }}-{{ season_end_month }}.
        {% elif not (weather_ok | bool) %}
          Pogoda blokuje podlewanie. Aktualny stan: {{ current_weather_condition_pl }}, prognoza: {{ forecast_condition_pl }}.
        {% elif not (rain_sensor_ok | bool) %}
          Czujnik deszczu jest aktywny: {{ rain_binary_sensor }} ma stan {{ states(rain_binary_sensor) }}.
        {% elif not (forecast_rain_ok | bool) %}
          Prognoza deszczu blokuje podlewanie: {{ forecast_precipitation | float(0) }} mm i {{ forecast_precipitation_probability | int(0) }}% prawdopodobienstwa.
        {% elif not (temp_ok | bool) %}
          Temperatura jest za niska: {{ temp_c | float(0) | round(1) }} C, minimum to {{ min_temperature_c }} C.
        {% elif not (wind_ok | bool) %}
          Wiatr jest za mocny: {{ wind_value | float(0) | round(1) }}, limit to {{ max_wind }}.
        {% else %}{% endif %}

  - alias: Zaloguj pominiecie calego podlewania
    choose:
      - conditions:
          - condition: template
            value_template: "{{ irrigation_skip_reason | trim | length > 0 and (enable_irrigation_logs | bool) }}"
        sequence:
          - action: logbook.log
            data:
              name: Inteligentne podlewanie
              message: "Pominieto podlewanie. {{ irrigation_skip_reason | trim }}"

  - alias: Powiadom o pominieciu calego podlewania
    choose:
      - conditions:
          - condition: template
            value_template: "{{ irrigation_skip_reason | trim | length > 0 and (create_persistent_notification | bool) }}"
        sequence:
          - action: persistent_notification.create
            data:
              title: Inteligentne podlewanie
              message: "Pominieto podlewanie. {{ irrigation_skip_reason | trim }}"
              notification_id: smart_irrigation_last_event

  - alias: Zatrzymaj gdy podlewanie pominiete
    choose:
      - conditions:
          - condition: template
            value_template: "{{ irrigation_skip_reason | trim | length > 0 }}"
        sequence:
          - stop: "Pominieto podlewanie: {{ irrigation_skip_reason | trim }}"

  - alias: Zaloguj start podlewania
    choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_irrigation_logs | bool }}"
        sequence:
          - action: logbook.log
            data:
              name: Inteligentne podlewanie
              message: >-
                Warunki pozwalaja podlewac. Prognoza opadu {{ forecast_precipitation | float(0) | round(1) }} mm,
                szansa deszczu {{ forecast_precipitation_probability | int(0) }}%,
                temperatura {{ temp_c | float(0) | round(1) }} C,
                wiatr {{ wind_value | float(0) | round(1) }}.

  - alias: Powiadom o starcie podlewania
    choose:
      - conditions:
          - condition: template
            value_template: "{{ create_persistent_notification | bool }}"
        sequence:
          - action: persistent_notification.create
            data:
              title: Inteligentne podlewanie
              message: >-
                Warunki pozwalaja podlewac. Sprawdzam sekcje i wyliczone czasy.
                Szczegoly sa w Logbooku.
              notification_id: smart_irrigation_last_event

  - alias: Podlej aktywne sekcje
    repeat:
      for_each:
      - number: 1
        valve: !input zone_1_valve
        name: !input zone_1_name
        soil_type: !input zone_1_soil_type
        plant_type: !input zone_1_plant_type
        sprinkler_profile: !input zone_1_sprinkler_profile
        custom_rate_mm_h: !input zone_1_custom_rate_mm_h
        runtime_adjustment_percent: !input zone_1_runtime_adjustment_percent
        online_sensor: !input zone_1_online_sensor
        battery_sensor: !input zone_1_battery_sensor
      - number: 2
        valve: !input zone_2_valve
        name: !input zone_2_name
        soil_type: !input zone_2_soil_type
        plant_type: !input zone_2_plant_type
        sprinkler_profile: !input zone_2_sprinkler_profile
        custom_rate_mm_h: !input zone_2_custom_rate_mm_h
        runtime_adjustment_percent: !input zone_2_runtime_adjustment_percent
        online_sensor: !input zone_2_online_sensor
        battery_sensor: !input zone_2_battery_sensor
      - number: 3
        valve: !input zone_3_valve
        name: !input zone_3_name
        soil_type: !input zone_3_soil_type
        plant_type: !input zone_3_plant_type
        sprinkler_profile: !input zone_3_sprinkler_profile
        custom_rate_mm_h: !input zone_3_custom_rate_mm_h
        runtime_adjustment_percent: !input zone_3_runtime_adjustment_percent
        online_sensor: !input zone_3_online_sensor
        battery_sensor: !input zone_3_battery_sensor
      - number: 4
        valve: !input zone_4_valve
        name: !input zone_4_name
        soil_type: !input zone_4_soil_type
        plant_type: !input zone_4_plant_type
        sprinkler_profile: !input zone_4_sprinkler_profile
        custom_rate_mm_h: !input zone_4_custom_rate_mm_h
        runtime_adjustment_percent: !input zone_4_runtime_adjustment_percent
        online_sensor: !input zone_4_online_sensor
        battery_sensor: !input zone_4_battery_sensor
      - number: 5
        valve: !input zone_5_valve
        name: !input zone_5_name
        soil_type: !input zone_5_soil_type
        plant_type: !input zone_5_plant_type
        sprinkler_profile: !input zone_5_sprinkler_profile
        custom_rate_mm_h: !input zone_5_custom_rate_mm_h
        runtime_adjustment_percent: !input zone_5_runtime_adjustment_percent
        online_sensor: !input zone_5_online_sensor
        battery_sensor: !input zone_5_battery_sensor
      - number: 6
        valve: !input zone_6_valve
        name: !input zone_6_name
        soil_type: !input zone_6_soil_type
        plant_type: !input zone_6_plant_type
        sprinkler_profile: !input zone_6_sprinkler_profile
        custom_rate_mm_h: !input zone_6_custom_rate_mm_h
        runtime_adjustment_percent: !input zone_6_runtime_adjustment_percent
        online_sensor: !input zone_6_online_sensor
        battery_sensor: !input zone_6_battery_sensor
      - number: 7
        valve: !input zone_7_valve
        name: !input zone_7_name
        soil_type: !input zone_7_soil_type
        plant_type: !input zone_7_plant_type
        sprinkler_profile: !input zone_7_sprinkler_profile
        custom_rate_mm_h: !input zone_7_custom_rate_mm_h
        runtime_adjustment_percent: !input zone_7_runtime_adjustment_percent
        online_sensor: !input zone_7_online_sensor
        battery_sensor: !input zone_7_battery_sensor
      - number: 8
        valve: !input zone_8_valve
        name: !input zone_8_name
        soil_type: !input zone_8_soil_type
        plant_type: !input zone_8_plant_type
        sprinkler_profile: !input zone_8_sprinkler_profile
        custom_rate_mm_h: !input zone_8_custom_rate_mm_h
        runtime_adjustment_percent: !input zone_8_runtime_adjustment_percent
        online_sensor: !input zone_8_online_sensor
        battery_sensor: !input zone_8_battery_sensor
      sequence:
        - alias: Wylicz parametry tej sekcji
          variables:
            section_number: "{{ repeat.item.number | int }}"
            section_enabled: "{{ (repeat.item.number | int) <= (zone_count | int(1)) }}"
            section_valve: "{{ repeat.item.valve }}"
            section_name: "{{ repeat.item.name }}"
            section_soil_factor: >-
              {% set soil = repeat.item.soil_type %}
              {% if soil == 'sand' %}1.18
              {% elif soil == 'sandy_loam' %}1.08
              {% elif soil == 'clay_loam' %}0.92
              {% elif soil == 'clay' %}0.85
              {% else %}1
              {% endif %}
            section_weekly_mm: >-
              {% set plant = repeat.item.plant_type %}
              {% if plant == 'flowers' %}20
              {% elif plant == 'vegetables' %}30
              {% elif plant == 'shrubs' %}18
              {% else %}25
              {% endif %}
            section_rate_mm_h: >-
              {% set profile = repeat.item.sprinkler_profile %}
              {% if profile == 'rainbird_rotor' %}12
              {% elif profile == 'rainbird_spray' %}38
              {% elif profile == 'rainbird_drip' %}8
              {% elif profile == 'hunter_rotor' %}11
              {% elif profile == 'hunter_mp_rotator' %}10
              {% elif profile == 'hunter_spray' %}40
              {% elif profile == 'hunter_drip' %}8
              {% else %}{{ repeat.item.custom_rate_mm_h | float(12) }}
              {% endif %}
            section_depth_mm: >-
              {% set runs = waterings_per_week | float(3) %}
              {% set raw = (section_weekly_mm | float(25)) / (runs if runs > 0 else 1) * (section_soil_factor | float(1)) * (soil_moisture_factor | float(1)) * (temp_factor | float(1)) * (sun_factor | float(1)) - (rain_credit_mm | float(0)) %}
              {% if raw < 0 %}0{% elif raw > (max_dose_mm | float(10)) %}{{ max_dose_mm | float(10) }}{% else %}{{ raw | round(1) }}{% endif %}
            section_minutes: >-
              {% set depth = section_depth_mm | float(0) %}
              {% set rate = (section_rate_mm_h | float(12)) * (irrigation_efficiency_percent | float(75)) / 100 %}
              {% set raw = (depth / (rate if rate > 0 else 1)) * 60 * (repeat.item.runtime_adjustment_percent | float(100)) / 100 %}
              {% set rounded = raw | round(0) | int %}
              {% if depth < (min_dose_mm | float(3)) %}0
              {% elif rounded < (min_runtime_minutes | int(8)) %}{{ min_runtime_minutes | int(8) }}
              {% elif rounded > (max_runtime_minutes | int(45)) %}{{ max_runtime_minutes | int(45) }}
              {% else %}{{ rounded }}
              {% endif %}
            section_ready: >-
              {{ section_enabled | bool
                 and section_valve | default('', true) | length > 0
                 and states(section_valve) in ['closed', 'off']
                 and (repeat.item.online_sensor | default('', true) | length == 0 or is_state(repeat.item.online_sensor, 'on'))
                 and (repeat.item.battery_sensor | default('', true) | length == 0 or (states(repeat.item.battery_sensor) | float(0)) >= (min_battery_percent | float(20))) }}
            section_skip_reason: >-
              {% if not (section_enabled | bool) %}
                Sekcja poza wybrana liczba sekcji.
              {% elif section_valve | default('', true) | length == 0 %}
                Brak zaworu/switcha dla sekcji.
              {% elif states(section_valve) not in ['closed', 'off'] %}
                Zawor nie jest gotowy do startu. Aktualny stan: {{ states(section_valve) }}.
              {% elif repeat.item.online_sensor | default('', true) | length > 0 and not is_state(repeat.item.online_sensor, 'on') %}
                Sensor online sekcji nie jest aktywny: {{ states(repeat.item.online_sensor) }}.
              {% elif repeat.item.battery_sensor | default('', true) | length > 0 and (states(repeat.item.battery_sensor) | float(0)) < (min_battery_percent | float(20)) %}
                Bateria zaworu za niska: {{ states(repeat.item.battery_sensor) }}%, minimum to {{ min_battery_percent }}%.
              {% elif (section_minutes | int(0)) <= 0 %}
                Wyliczona dawka {{ section_depth_mm | float(0) | round(1) }} mm jest ponizej minimum {{ min_dose_mm }} mm.
              {% else %}{% endif %}
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ section_ready | bool and (section_minutes | int(0)) > 0 }}"
              sequence:
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ enable_irrigation_logs | bool }}"
                      sequence:
                        - action: logbook.log
                          data:
                            name: "Podlewanie - {{ section_name }}"
                            message: >-
                              Start sekcji {{ section_number }} na {{ section_minutes | int(0) }} min.
                              Dawka {{ section_depth_mm | float(0) | round(1) }} mm,
                              opad zraszaczy {{ section_rate_mm_h | float(0) | round(1) }} mm/h.
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ create_persistent_notification | bool }}"
                      sequence:
                        - action: persistent_notification.create
                          data:
                            title: Inteligentne podlewanie
                            message: >-
                              Start sekcji {{ section_number }}: {{ section_name }}.
                              Czas {{ section_minutes | int(0) }} min, dawka {{ section_depth_mm | float(0) | round(1) }} mm.
                            notification_id: smart_irrigation_last_event
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ section_valve.split('.')[0] == 'switch' }}"
                      sequence:
                        - action: switch.turn_on
                          target:
                            entity_id: "{{ section_valve }}"
                  default:
                    - action: valve.open_valve
                      target:
                        entity_id: "{{ section_valve }}"
                - wait_template: >-
                    {{ ((rain_binary_sensor | default('', true) | length > 0) and is_state(rain_binary_sensor, 'on'))
                       or states(current_weather_entity) in bad_weather_states }}
                  timeout: >-
                    {{ '%02d:%02d:00' | format((section_minutes | int(1)) // 60, (section_minutes | int(1)) % 60) }}
                  continue_on_timeout: true
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ section_valve.split('.')[0] == 'switch' }}"
                      sequence:
                        - action: switch.turn_off
                          target:
                            entity_id: "{{ section_valve }}"
                  default:
                    - action: valve.close_valve
                      target:
                        entity_id: "{{ section_valve }}"
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ enable_irrigation_logs | bool }}"
                      sequence:
                        - action: logbook.log
                          data:
                            name: "Podlewanie - {{ section_name }}"
                            message: "Zakonczono sekcje {{ section_number }} po zaplanowanym czasie {{ section_minutes | int(0) }} min."
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ create_persistent_notification | bool }}"
                      sequence:
                        - action: persistent_notification.create
                          data:
                            title: Inteligentne podlewanie
                            message: "Zakonczono sekcje {{ section_number }}: {{ section_name }}. Planowany czas {{ section_minutes | int(0) }} min."
                            notification_id: smart_irrigation_last_event
                - choose:
                    - conditions:
                        - condition: template
                          value_template: >-
                            {{ ((rain_binary_sensor | default('', true) | length > 0) and is_state(rain_binary_sensor, 'on'))
                               or states(current_weather_entity) in bad_weather_states }}
                      sequence:
                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ enable_irrigation_logs | bool }}"
                              sequence:
                                - action: logbook.log
                                  data:
                                    name: Inteligentne podlewanie
                                    message: "Przerwano pozostale sekcje po sekcji {{ section_number }} z powodu deszczu albo zlej pogody."
                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ create_persistent_notification | bool }}"
                              sequence:
                                - action: persistent_notification.create
                                  data:
                                    title: Inteligentne podlewanie
                                    message: "Przerwano pozostale sekcje po sekcji {{ section_number }} z powodu deszczu albo zlej pogody."
                                    notification_id: smart_irrigation_last_event
                        - stop: Podlewanie przerwane przez deszcz.
                - delay:
                    seconds: "{{ zone_pause_seconds | int(15) }}"
          default:
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ section_enabled | bool and (enable_irrigation_logs | bool) }}"
                  sequence:
                    - action: logbook.log
                      data:
                        name: "Podlewanie - {{ section_name }}"
                        message: "Pominieto sekcje {{ section_number }}. {{ section_skip_reason | trim }}"
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ section_enabled | bool and (create_persistent_notification | bool) }}"
                  sequence:
                    - action: persistent_notification.create
                      data:
                        title: Inteligentne podlewanie
                        message: "Pominieto sekcje {{ section_number }}: {{ section_name }}. {{ section_skip_reason | trim }}"
                        notification_id: smart_irrigation_last_event

  - alias: Zaloguj koniec cyklu
    choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_irrigation_logs | bool }}"
        sequence:
          - action: logbook.log
            data:
              name: Inteligentne podlewanie
              message: "Zakonczono cykl sprawdzania sekcji podlewania."

  - alias: Powiadom o koncu cyklu
    choose:
      - conditions:
          - condition: template
            value_template: "{{ create_persistent_notification | bool }}"
        sequence:
          - action: persistent_notification.create
            data:
              title: Inteligentne podlewanie
              message: "Zakonczono cykl sprawdzania sekcji podlewania. Szczegoly sa w Logbooku."
              notification_id: smart_irrigation_last_event
