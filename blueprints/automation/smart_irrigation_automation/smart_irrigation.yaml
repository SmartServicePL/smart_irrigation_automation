blueprint:
  name: Inteligentne podlewanie ogrodu - 1 do 8 sekcji
  description: >
    Uniwersalny blueprint podlewania od 1 do 8 sekcji. Wspolne sa encje
    pogodowe i opcjonalne posiadane sensory. Dla kazdej sekcji osobno
    ustawiasz nazwe, zawor, rodzaj gleby, co rosnie, typ zraszaczy
    Rain Bird/Hunter, korekte czasu oraz opcjonalne sensory online/baterii.
  domain: automation
  author: Smart Service
  homeassistant:
    min_version: 2025.1.0
  source_url: https://github.com/SmartServicePL/smart_irrigation_automation/blob/main/blueprints/automation/smart_irrigation_automation/smart_irrigation.yaml
  input:
    weather_section:
      name: Wspolne encje pogody i sensory
      icon: mdi:weather-partly-rainy
      input:
        forecast_weather_entity:
          name: Encja pogody do prognozy
          description: Weather uzywany do pobrania prognozy dziennej. Z prognozy automatyzacja bierze opad, prawdopodobienstwo deszczu i temperature awaryjna.
          selector:
            entity:
              filter:
                - domain: weather
        current_weather_entity:
          name: Lokalna encja pogody
          description: Lokalna pogoda z aktualnym stanem. Puste = uzyj encji prognozy. Stan rainy/pouring itp. blokuje podlewanie.
          default: ""
          selector:
            entity:
              filter:
                - domain: weather
        rain_binary_sensor:
          name: Czujnik deszczu
          description: Opcjonalny czujnik fizycznego deszczu. Gdy ma stan on, podlewanie nie wystartuje albo zostanie przerwane.
          default: ""
          selector:
            entity:
              filter:
                - domain: binary_sensor
        rain_amount_sensor:
          name: Sensor opadu
          description: Sensor aktualnego lub ostatniego opadu w mm. Ta wartosc jest odejmowana od potrzebnej dawki wody.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
        temperature_source_entity:
          name: Temperatura ogrodu
          description: Sensor temperatury w ogrodzie albo encja weather. Niska temperatura blokuje podlewanie, upal zwieksza dawke.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                - domain: weather
        wind_source_entity:
          name: Wiatr
          description: Sensor wiatru albo encja weather. Zbyt mocny wiatr blokuje podlewanie, bo zraszacze tracilyby rownomiernosc.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                - domain: weather
        sunlight_source_entity:
          name: UV / slonce
          description: Sensor UV/slonca albo weather z uv_index. Wysokie UV lekko zwieksza dawke, niskie lekko zmniejsza.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                - domain: weather
        soil_moisture_sensor:
          name: Wilgotnosc gleby
          description: Opcjonalny wspolny sensor wilgotnosci gleby w procentach. Przy wysokiej wilgotnosci podlewanie jest ograniczane albo pomijane.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor

    general_section:
      name: Ustawienia ogolne
      icon: mdi:tune
      input:
        zone_count:
          name: Liczba sekcji
          description: Ile sekcji ma obslugiwac ta automatyzacja. Sekcje powyzej tej liczby zostaja w konfiguracji, ale sa ignorowane.
          default: 1
          selector:
            number:
              min: 1
              max: 8
              step: 1
              mode: slider

    zone_1_section:
      name: Sekcja 1
      icon: mdi:sprinkler-variant
      input:
        zone_1_valve:
          name: Sekcja 1 - zawor
          description: Zawor albo switch sterujacy ta sekcja. Automatyzacja otworzy go na wyliczony czas i zamknie po zakonczeniu.
          selector:
            entity:
              filter:
                - domain: valve
                - domain: switch
        zone_1_name:
          name: Sekcja 1 - nazwa
          description: Czytelna nazwa sekcji widoczna w sladowaniu automatyzacji i ulatwiajaca rozpoznanie obszaru podlewania.
          default: Sekcja 1
          selector:
            text:
        zone_1_soil_type:
          name: Sekcja 1 - rodzaj gleby
          description: Wplywa na dawke wody. Piasek potrzebuje wiecej, glina mniej i wolniej przyjmuje wode.
          default: loam
          selector:
            select:
              mode: dropdown
              options:
                - label: Piaszczysta
                  value: sand
                - label: Piaszczysto-gliniasta
                  value: sandy_loam
                - label: Prochnicza / gliniasta lekka
                  value: loam
                - label: Gliniasta
                  value: clay_loam
                - label: Ciezka glina
                  value: clay
        zone_1_plant_type:
          name: Sekcja 1 - co rosnie
          description: Okresla bazowe zapotrzebowanie na wode. Warzywa najwiecej, trawa srednio, krzewy zwykle mniej.
          default: grass
          selector:
            select:
              mode: dropdown
              options:
                - label: Trawa
                  value: grass
                - label: Kwiaty
                  value: flowers
                - label: Warzywa
                  value: vegetables
                - label: Krzewy
                  value: shrubs
        zone_1_sprinkler_profile:
          name: Sekcja 1 - zraszacze
          description: Profil ustawia opad instalacji w mm/h. Im wiekszy opad zraszaczy, tym krotszy wyliczony czas podlewania.
          default: rainbird_rotor
          selector:
            select:
              mode: dropdown
              options:
                - label: Rain Bird - rotory
                  value: rainbird_rotor
                - label: Rain Bird - spray/statyczne
                  value: rainbird_spray
                - label: Rain Bird - linia kroplujaca
                  value: rainbird_drip
                - label: Hunter - rotory
                  value: hunter_rotor
                - label: Hunter - MP Rotator
                  value: hunter_mp_rotator
                - label: Hunter - spray/statyczne
                  value: hunter_spray
                - label: Hunter - linia kroplujaca
                  value: hunter_drip
                - label: Wlasny opad zraszaczy
                  value: custom
        zone_1_custom_rate_mm_h:
          name: Sekcja 1 - wlasny opad zraszaczy
          description: Uzywane tylko przy profilu "Wlasny opad zraszaczy". Wpisz rzeczywisty opad sekcji w mm/h, jezeli znasz go z testu kubeczkowego albo dokumentacji.
          default: 12
          selector:
            number:
              min: 1
              max: 80
              step: 0.5
              unit_of_measurement: mm/h
              mode: box
        zone_1_runtime_adjustment_percent:
          name: Sekcja 1 - korekta czasu
          description: Reczna korekta dla tej sekcji. 100% = bez zmian, wiecej wydluza podlewanie, mniej skraca.
          default: 100
          selector:
            number:
              min: 50
              max: 180
              step: 5
              unit_of_measurement: "%"
              mode: slider
        zone_1_online_sensor:
          name: Sekcja 1 - online
          description: Opcjonalny binary_sensor online. Jesli jest ustawiony i ma stan off, sekcja zostanie pominieta.
          default: ""
          selector:
            entity:
              filter:
                - domain: binary_sensor
        zone_1_battery_sensor:
          name: Sekcja 1 - bateria
          description: Opcjonalny sensor baterii zaworu. Sekcja zostanie pominieta, gdy bateria spadnie ponizej progu z blokad pogodowych.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor

