    schedule_section:
      name: Harmonogram, sezon i progi
      icon: mdi:calendar-clock
      input:
        schedule_mode:
          name: Start podlewania
          description: Stala godzina uzywa godzin ponizej. Tryb slonca startuje podlewanie wzgledem wschodu albo zachodu.
          default: fixed_time
          selector:
            select:
              mode: dropdown
              options:
                - label: Stala godzina
                  value: fixed_time
                - label: Wzgledem wschodu slonca
                  value: sunrise
                - label: Wzgledem zachodu slonca
                  value: sunset
        sun_event_offset_minutes:
          name: Przesuniecie wzgledem slonca
          description: Minuty wzgledem wschodu/zachodu. Wartosc ujemna = przed, dodatnia = po.
          default: -30
          selector:
            number:
              min: -180
              max: 180
              step: 5
              unit_of_measurement: min
              mode: slider
        primary_start_time:
          name: Glowna godzina podlewania
          description: Uzywana tylko przy trybie "Stala godzina".
          default: "04:30:00"
          selector:
            time:
        backup_start_time:
          name: Druga proba podlewania
          description: Uzywana tylko przy trybie "Stala godzina".
          default: "05:30:00"
          selector:
            time:
        enable_backup_time:
          name: Wlacz druga probe
          description: Dotyczy tylko trybu "Stala godzina".
          default: true
          selector:
            boolean:
        season_start_month:
          name: Miesiac startu sezonu
          description: Pierwszy miesiac, w ktorym automatyzacja moze podlewac. Poza sezonem zawory nie sa uruchamiane.
          default: 4
          selector:
            number:
              min: 1
              max: 12
              step: 1
              mode: slider
        season_end_month:
          name: Miesiac konca sezonu
          description: Ostatni miesiac sezonu podlewania. Przyklad 4-10 oznacza podlewanie od kwietnia do pazdziernika.
          default: 10
          selector:
            number:
              min: 1
              max: 12
              step: 1
              mode: slider
        waterings_per_week:
          name: Podlewania tygodniowo
          description: Ile razy w tygodniu ma byc dzielone zapotrzebowanie roslin na wode. Wieksza liczba = mniejsza dawka jednego podlewania.
          default: 3
          selector:
            number:
              min: 1
              max: 7
              step: 1
              mode: slider
        min_dose_mm:
          name: Minimalna dawka do startu
          description: Jesli wyliczona dawka dla sekcji jest mniejsza, sekcja zostanie pominieta. Chroni przed bezsensownymi, bardzo krotkimi cyklami.
          default: 3
          selector:
            number:
              min: 0.5
              max: 15
              step: 0.5
              unit_of_measurement: mm
              mode: slider
        max_dose_mm:
          name: Maksymalna dawka jednego podlewania
          description: Gorny limit wody na jedno podlewanie sekcji. Chroni przed przelaniem i zbyt dluga praca po kilku suchych dniach.
          default: 10
          selector:
            number:
              min: 3
              max: 30
              step: 0.5
              unit_of_measurement: mm
              mode: slider
        min_runtime_minutes:
          name: Minimalny czas sekcji
          description: Najkrotszy czas pracy sekcji, jesli podlewanie juz wystartuje. Pomaga utrzymac stabilna prace zaworow i instalacji.
          default: 8
          selector:
            number:
              min: 1
              max: 30
              step: 1
              unit_of_measurement: min
              mode: slider
        max_runtime_minutes:
          name: Maksymalny czas sekcji
          description: Najdluzszy dopuszczalny czas pracy jednej sekcji w jednym cyklu. Ogranicza ryzyko zbyt dlugiego podlewania.
          default: 45
          selector:
            number:
              min: 5
              max: 120
              step: 5
              unit_of_measurement: min
              mode: slider
        zone_pause_seconds:
          name: Przerwa miedzy sekcjami
          description: Odstep po zamknieciu jednej sekcji przed startem kolejnej. Daje instalacji czas na ustabilizowanie cisnienia.
          default: 15
          selector:
            number:
              min: 0
              max: 120
              step: 5
              unit_of_measurement: s
              mode: slider

    safety_section:
      name: Blokady pogodowe
      icon: mdi:shield-check
      collapsed: true
      input:
        max_forecast_rain_mm:
          name: Prognozowany deszcz blokujacy
          description: Jesli prognoza pokazuje co najmniej tyle mm deszczu, podlewanie zostanie pominiete.
          default: 4
          selector:
            number:
              min: 0
              max: 30
              step: 0.5
              unit_of_measurement: mm
              mode: slider
        max_rain_probability_percent:
          name: Prawdopodobienstwo deszczu blokujace
          description: Podlewanie zostanie zablokowane, gdy szansa deszczu przekroczy ten prog i prognoza pokazuje co najmniej 1 mm opadu.
          default: 80
          selector:
            number:
              min: 30
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider
        rain_credit_percent:
          name: Ile deszczu odjac od dawki
          description: Ile procent prognozowanego/zmierzonego deszczu odjac od wyliczonej dawki podlewania. 80% oznacza ostrozne uwzglednianie opadu.
          default: 80
          selector:
            number:
              min: 0
              max: 120
              step: 5
              unit_of_measurement: "%"
              mode: slider
        min_temperature_c:
          name: Minimalna temperatura
          description: Ponizej tej temperatury podlewanie nie wystartuje. Chroni rosliny i instalacje przy zimnych porankach.
          default: 8
          selector:
            number:
              min: -5
              max: 20
              step: 0.5
              unit_of_measurement: C
              mode: slider
        hot_temperature_c:
          name: Temperatura upalu
          description: Od tej temperatury automatyzacja lekko zwieksza dawke wody, bo parowanie jest wieksze.
          default: 28
          selector:
            number:
              min: 20
              max: 40
              step: 0.5
              unit_of_measurement: C
              mode: slider
        max_wind:
          name: Maksymalny wiatr
          description: Przy wietrze powyzej tej wartosci podlewanie zostanie pominiete, zeby woda nie byla znoszona poza sekcje.
          default: 35
          selector:
            number:
              min: 0
              max: 100
              step: 1
              mode: slider
        min_battery_percent:
          name: Minimalna bateria zaworu
          description: Jesli sekcja ma sensor baterii i bateria jest ponizej tego progu, sekcja zostanie pominieta.
          default: 20
          selector:
            number:
              min: 0
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider
        irrigation_efficiency_percent:
          name: Sprawnosc instalacji
          description: Uwzglednia straty instalacji, nierowny opad i parowanie. Nizsza wartosc wydluza podlewanie; 70-85% jest typowe.
          default: 75
          selector:
            number:
              min: 40
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider

    log_section:
      name: Logi podlewania
      icon: mdi:text-box-search
      collapsed: true
      input:
        enable_irrigation_logs:
          name: Wlacz logbook.log
          description: Dodaje wpisy do Logbooka HA. Obejmuje start cyklu, pomijanie z powodem, start/koniec sekcji oraz przerwanie przez deszcz.
          default: false
          selector:
            boolean:
        create_persistent_notification:
          name: Tworz powiadomienie persistent_notification
          description: Dodatkowo do logbook.log pokazuje ostatni powod startu, pominiecia albo przerwania podlewania w powiadomieniach Home Assistant.
          default: false
          selector:
            boolean:

mode: single
max_exceeded: silent

triggers:
  - trigger: time
    id: primary
    at: !input primary_start_time
  - trigger: time
    id: backup
    at: !input backup_start_time
  - trigger: time_pattern
    id: sun_check
    minutes: "/1"

