          default: grass
          selector:
            select:
              mode: dropdown
              options:
                - label: Trawa
                  value: grass
                - label: Kwiaty
                  value: flowers
                - label: Warzywa
                  value: vegetables
                - label: Krzewy
                  value: shrubs
        zone_6_sprinkler_profile:
          name: Sekcja 6 - zraszacze
          description: Profil ustawia opad instalacji w mm/h. Im wiekszy opad zraszaczy, tym krotszy wyliczony czas podlewania.
          default: rainbird_rotor
          selector:
            select:
              mode: dropdown
              options:
                - label: Rain Bird - rotory
                  value: rainbird_rotor
                - label: Rain Bird - spray/statyczne
                  value: rainbird_spray
                - label: Rain Bird - linia kroplujaca
                  value: rainbird_drip
                - label: Hunter - rotory
                  value: hunter_rotor
                - label: Hunter - MP Rotator
                  value: hunter_mp_rotator
                - label: Hunter - spray/statyczne
                  value: hunter_spray
                - label: Hunter - linia kroplujaca
                  value: hunter_drip
                - label: Wlasny opad zraszaczy
                  value: custom
        zone_6_custom_rate_mm_h:
          name: Sekcja 6 - wlasny opad zraszaczy
          description: Uzywane tylko przy profilu "Wlasny opad zraszaczy". Wpisz rzeczywisty opad sekcji w mm/h, jezeli znasz go z testu kubeczkowego albo dokumentacji.
          default: 12
          selector:
            number:
              min: 1
              max: 80
              step: 0.5
              unit_of_measurement: mm/h
              mode: box
        zone_6_runtime_adjustment_percent:
          name: Sekcja 6 - korekta czasu
          description: Reczna korekta dla tej sekcji. 100% = bez zmian, wiecej wydluza podlewanie, mniej skraca.
          default: 100
          selector:
            number:
              min: 50
              max: 180
              step: 5
              unit_of_measurement: "%"
              mode: slider
        zone_6_online_sensor:
          name: Sekcja 6 - online
          description: Opcjonalny binary_sensor online. Jesli jest ustawiony i ma stan off, sekcja zostanie pominieta.
          default: ""
          selector:
            entity:
              filter:
                - domain: binary_sensor
        zone_6_battery_sensor:
          name: Sekcja 6 - bateria
          description: Opcjonalny sensor baterii zaworu. Sekcja zostanie pominieta, gdy bateria spadnie ponizej progu z blokad pogodowych.
          default: ""
